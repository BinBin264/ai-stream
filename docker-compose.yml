services:
  postgres:
    image: postgres:15-alpine
    container_name: dtp-stream-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stream_db}
      POSTGRES_USER: ${POSTGRES_USER:-stream_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stream_password}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stream_user} -d ${POSTGRES_DB:-stream_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dtp-stream-redis
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: dtp-stream-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - models_data:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: dtp-stream-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8100}
      NEXT_PUBLIC_WS_URL: ws://localhost:${BACKEND_PORT:-8100}
    ports:
      - "${FRONTEND_PORT:-3100}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  comment-worker:
    build:
      context: ./backend
    container_name: dtp-stream-comment-worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.comment_worker
    restart: unless-stopped

  speech-worker:
    build:
      context: ./backend
    container_name: dtp-stream-speech-worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - models_data:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.speech_worker
    restart: unless-stopped

  avatar-worker:
    build:
      context: ./backend
    container_name: dtp-stream-avatar-worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - models_data:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.avatar_render_worker
    restart: unless-stopped

  dynamic-playout-worker:
    build:
      context: ./backend
    container_name: dtp-stream-dynamic-playout-worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.dynamic_playout_worker
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  media_data:
  models_data:
